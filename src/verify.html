<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Verifying — Meridian Investor Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --primary:#0A2540; --accent:#1E6FD9; --gold:#C8A96E;
  --success:#0E7C4A; --danger:#B91C1C;
  --white:#fff; --surface:#F7F9FC;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'DM Sans',sans-serif;
  background:linear-gradient(150deg,#061A30,#0A2540,#0F3460);
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:24px;
}
.card {
  background:var(--white); border-radius:20px;
  padding:56px 48px; max-width:440px; width:100%;
  text-align:center; box-shadow:0 24px 64px rgba(10,37,64,0.25);
}
.brand { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:40px; }
.brand-mark {
  width:40px; height:40px; background:var(--gold); border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:700; color:var(--primary);
}
.brand-name { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600; color:var(--primary); }
.state { display:none; animation:fadeIn 0.3s ease; }
.state.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.icon {
  width:72px; height:72px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 24px; font-size:32px;
}
.icon-loading { background:#EBF3FF; }
.icon-success { background:#E6F4EE; }
.icon-error   { background:#FEE2E2; }
h2 { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:600; color:var(--primary); margin-bottom:10px; }
p  { font-size:14px; color:#4A6080; line-height:1.7; }
.spinner {
  width:36px; height:36px;
  border:3px solid rgba(30,111,217,0.2);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin:0 auto;
}
@keyframes spin { to { transform:rotate(360deg); } }
.btn {
  display:inline-block; margin-top:28px;
  background:var(--accent); color:#fff;
  padding:13px 32px; border-radius:9px;
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
  text-decoration:none; cursor:pointer; border:none;
  transition:all 0.2s;
}
.btn:hover { background:#3D8EF0; transform:translateY(-1px); }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-mark">M</div>
    <div class="brand-name">Meridian Capital</div>
  </div>

  <!-- Loading -->
  <div class="state active" id="stateLoading">
    <div class="icon icon-loading"><div class="spinner"></div></div>
    <h2>Verifying your link</h2>
    <p>Please wait while we securely authenticate your access...</p>
  </div>

  <!-- Success -->
  <div class="state" id="stateSuccess">
    <div class="icon icon-success">✓</div>
    <h2>You're in</h2>
    <p>Identity verified. Redirecting you to your dashboard now...</p>
  </div>

  <!-- Error -->
  <div class="state" id="stateError">
    <div class="icon icon-error">⚠</div>
    <h2 id="errTitle">Link expired</h2>
    <p id="errMsg">This sign-in link has expired or already been used.</p>
    <a href="/src/login.html" class="btn">Request a new link</a>
  </div>
</div>

<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<script src="../config.js"></script>
<script src="../services/sharepoint.js"></script>
<script src="../services/auth.js"></script>
<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  if (!token) {
    showError('Invalid Link', 'No verification token was found in this link.');
    return;
  }

  try {
    const user = await authService.verifyToken(token);
    setState('stateSuccess');
    const dest = user.Role === 'Admin'
      ? '/src/pages/dashboard.html'
      : '/src/pages/dashboard.html';
    setTimeout(() => { window.location.href = dest; }, 1800);
  } catch(e) {
    showError('Verification Failed', e.message);
  }
})();

function setState(id) {
  document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showError(title, msg) {
  document.getElementById('errTitle').textContent = title;
  document.getElementById('errMsg').textContent   = msg;
  setState('stateError');
}
</script>
</body>
</html>
